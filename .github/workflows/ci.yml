name: CI

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run ruff
        run: uv run ruff check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run pytest
        run: uv run pytest --tb=short
        env:
          OPENWEATHER_API_KEY: dummy
          JWT_SECRET_KEY: ci-secret
