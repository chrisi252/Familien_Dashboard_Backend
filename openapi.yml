openapi: 3.0.3
info:
  title: Familien-Dashboard API
  description: Backend API for the Familien-Dashboard application
  version: 1.0.0

servers:
  - url: http://localhost:5000
    description: Local development server
  - url: https://pi.erikbreuer.de
    description: Production server

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token_cookie

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: johndoe
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        is_active:
          type: boolean
          example: true
        is_system_admin:
          type: boolean
          example: false
          description: true if the account has system administrator privileges
        created_at:
          type: string
          format: date-time

    Family:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Mustermann Familie
        created_at:
          type: string
          format: date-time

    Role:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Familyadmin

    UserFamilyRole:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        family_id:
          type: integer
        role_id:
          type: integer
        role_name:
          type: string
          example: Familyadmin
        user_username:
          type: string
          example: johndoe

    Todo:
      type: object
      properties:
        id:
          type: integer
          example: 1
        family_id:
          type: integer
          example: 1
        title:
          type: string
          example: Einkaufen
        description:
          type: string
          nullable: true
          example: Milch und Brot
        is_completed:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Widget:
      type: object
      properties:
        id:
          type: integer
          example: 1
        family_id:
          type: integer
          example: 1
        widget_type_id:
          type: integer
          example: 1
        widget_key:
          type: string
          example: todo
        display_name:
          type: string
          example: Aufgaben
        description:
          type: string
          example: Shared todo list for the family
        position:
          type: integer
          nullable: true
          example: 0
          description: Display position in the user's dashboard. null if not yet configured.
        grid_col:
          type: integer
          nullable: true
          example: 2
          description: Width in grid columns. null if not yet configured.
        grid_row:
          type: integer
          nullable: true
          example: 1
          description: Height in grid rows. null if not yet configured.
        can_edit:
          type: boolean
          example: true
          description: Whether the requesting user is allowed to edit this widget

    UserWidgetConfig:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 5
        family_widget_id:
          type: integer
          example: 1
        position:
          type: integer
          example: 0
        grid_col:
          type: integer
          example: 2
        grid_row:
          type: integer
          example: 1

    WidgetUserPermission:
      type: object
      properties:
        id:
          type: integer
          example: 1
        family_widget_id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 2
        can_view:
          type: boolean
          example: true
        can_edit:
          type: boolean
          example: false

    WeatherLocation:
      type: object
      properties:
        id:
          type: integer
          example: 1
        family_id:
          type: integer
          example: 1
        city_name:
          type: string
          example: Berlin
        latitude:
          type: number
          format: float
          example: 52.52
        longitude:
          type: number
          format: float
          example: 13.405
        updated_at:
          type: string
          format: date-time

    WeatherCurrent:
      type: object
      properties:
        temperature:
          type: number
          format: float
          example: 18.5
        apparent_temperature:
          type: number
          format: float
          example: 16.2
        humidity:
          type: integer
          example: 65
        wind_speed:
          type: number
          format: float
          example: 12.3
        weather_code:
          type: integer
          example: 800
        weather_description:
          type: string
          example: Klarer Himmel
        icon:
          type: string
          example: 01d

    WeatherForecastDay:
      type: object
      properties:
        date:
          type: string
          format: date
          example: "2026-04-01"
        weather_code:
          type: integer
          example: 803
        weather_description:
          type: string
          example: Mostly cloudy
        icon:
          type: string
          example: 04d
        temperature_max:
          type: number
          format: float
          example: 22.1
        temperature_min:
          type: number
          format: float
          example: 10.4

    WeatherResponse:
      type: object
      properties:
        location:
          $ref: "#/components/schemas/WeatherLocation"
        current:
          $ref: "#/components/schemas/WeatherCurrent"
        forecast:
          type: array
          items:
            $ref: "#/components/schemas/WeatherForecastDay"

    TimetableEntry:
      type: object
      properties:
        id:
          type: integer
          example: 1
        family_id:
          type: integer
          example: 1
        person_name:
          type: string
          example: Emma
        color:
          type: string
          example: "#EF4444"
          description: Hex color value, e.g. #EF4444
        weekday:
          type: integer
          example: 0
          description: 0=Monday, 1=Tuesday, 2=Wednesday, 3=Thursday, 4=Friday
        start_time:
          type: string
          example: "08:00"
          description: Format HH:MM
        end_time:
          type: string
          example: "08:45"
          description: Format HH:MM
        subject:
          type: string
          example: Mathematik
        room:
          type: string
          nullable: true
          example: "101"
        teacher:
          type: string
          nullable: true
          example: Mr. Smith
        note:
          type: string
          nullable: true
          example: Don't forget homework
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TimetablePerson:
      type: object
      properties:
        person_name:
          type: string
          example: Emma
        color:
          type: string
          example: "#EF4444"

    FamilyInviteCode:
      type: object
      properties:
        id:
          type: integer
          example: 1
        family_id:
          type: integer
          example: 3
        code:
          type: string
          example: "X7K2BN"
          description: 6-character invite code (uppercase, alphanumeric)
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          description: Expiration time (2 minutes after creation)

    AuthResponse:
      type: object
      properties:
        message:
          type: string
          example: User registered successfully
        user:
          $ref: "#/components/schemas/User"

    AuthLoginResponse:
      type: object
      properties:
        message:
          type: string
          example: Login successful
        user:
          $ref: "#/components/schemas/User"
        families:
          type: array
          items:
            type: object
            properties:
              family_id:
                type: integer
                example: 1
              is_admin:
                type: boolean
                example: true

    Error:
      type: object
      properties:
        error:
          type: string
          example: Error message

    DeleteResponse:
      type: object
      properties:
        message:
          type: string

paths:
  /:
    get:
      summary: API status
      tags: [Health]
      responses:
        "200":
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Familien-Dashboard API aktiv

  /api/health:
    get:
      summary: Health check
      tags: [Health]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Familien-Dashboard API läuft einwandfrei

  /api/users/register:
    post:
      summary: Register a new user
      description: JWT is set as an HttpOnly cookie in the response.
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, first_name, last_name]
              properties:
                username:
                  type: string
                  example: johndoe
                password:
                  type: string
                  format: password
                  example: secret123
                first_name:
                  type: string
                  example: John
                last_name:
                  type: string
                  example: Doe
      responses:
        "201":
          description: User registered successfully. JWT cookie is set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Missing fields or username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/users/login:
    post:
      summary: Log in with username and password
      description: JWT is set as an HttpOnly cookie in the response.
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: johndoe
                password:
                  type: string
                  format: password
                  example: secret123
      responses:
        "200":
          description: Login successful. JWT cookie is set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        "400":
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Account is inactive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/users/profile:
    get:
      summary: Get the currently authenticated user's profile
      tags: [Users]
      security:
        - cookieAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/users/logout:
    post:
      summary: Logout — clears the JWT cookie
      tags: [Users]
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logout successful

  /api/families:
    get:
      summary: Get all families the authenticated user belongs to
      tags: [Families]
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of families with roles
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    family:
                      $ref: "#/components/schemas/Family"
                    role:
                      $ref: "#/components/schemas/Role"
                    user_family_role:
                      $ref: "#/components/schemas/UserFamilyRole"
        "400":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Create a new family
      description: >
        The authenticated user is automatically assigned the Familyadmin role.
        All registered widgets are automatically created for the family with
        default permissions for the admin.
      tags: [Families]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: Mustermann Familie
      responses:
        "201":
          description: Family created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Family"
        "400":
          description: Missing name or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}:
    get:
      summary: Get details of a specific family including its members
      description: Only accessible to members of the family.
      tags: [Families]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Family details with member list
          content:
            application/json:
              schema:
                type: object
                properties:
                  family:
                    $ref: "#/components/schemas/Family"
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserFamilyRole"
        "403":
          description: Access denied — not a member of this family
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Family not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete a family and all associated data
      description: Requires Familyadmin role. Cascades deletion to all related widgets, todos, and user roles.
      tags: [Families]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Family deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "403":
          description: Not a family admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}/invite-code:
    post:
      summary: Generate a 6-character invite code for a family
      description: >
        Requires Familyadmin role. Generates a new invite code valid for 2 minutes.
        Any previous code for this family is replaced.
      tags: [Families]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Invite code generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyInviteCode"
        "400":
          description: Family not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not a family admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/join-by-code:
    post:
      summary: Join a family using an invite code
      description: >
        The code resolves to a family. The user is added with the Guest role.
        Code is case-insensitive. Expired codes return a 400 error.
      tags: [Families]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  example: "X7K2BN"
                  description: 6-character invite code
      responses:
        "200":
          description: Joined family successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserFamilyRole"
        "400":
          description: Invalid or expired code, or already a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}/widgets:
    get:
      summary: Get widgets visible to the authenticated user
      description: >
        Returns all widgets for which the user has can_view=true.
        Includes can_edit so the frontend can show or hide edit controls.
      tags: [Widgets]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of widgets with permissions for this user
          content:
            application/json:
              schema:
                type: object
                properties:
                  widgets:
                    type: array
                    items:
                      $ref: "#/components/schemas/Widget"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}/widgets/{family_widget_id}/permissions:
    get:
      summary: Get all user permissions for a widget
      description: Requires Familyadmin role. Returns can_view and can_edit for every family member for this widget.
      tags: [Widgets]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
        - name: family_widget_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of user permissions for this widget
          content:
            application/json:
              schema:
                type: object
                properties:
                  permissions:
                    type: array
                    items:
                      $ref: "#/components/schemas/WidgetUserPermission"
        "403":
          description: Not a family admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Widget not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}/widgets/{family_widget_id}/permissions/{user_id}:
    put:
      summary: Override widget permissions for a specific user
      description: >
        Requires Familyadmin role. Overwrites the user's can_view and can_edit
        for this widget. Default permissions are applied when a user joins —
        this endpoint is the only way to change them afterwards.
      tags: [Widgets]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
        - name: family_widget_id
          in: path
          required: true
          schema:
            type: integer
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [can_view, can_edit]
              properties:
                can_view:
                  type: boolean
                  example: true
                can_edit:
                  type: boolean
                  example: true
      responses:
        "200":
          description: Permission updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WidgetUserPermission"
        "403":
          description: Not a family admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Widget or permission entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}/widgets/layout:
    put:
      summary: Save the dashboard layout for the authenticated user
      description: >
        Replaces all UserWidgetConfig entries for this user and family atomically.
        Send the full current addedWidgets array on every drag-drop or resize.
        No admin role required — each user manages their own layout.
      tags: [Widgets]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [layout]
              properties:
                layout:
                  type: array
                  items:
                    type: object
                    required: [family_widget_id, position, grid_col, grid_row]
                    properties:
                      family_widget_id:
                        type: integer
                        example: 1
                      position:
                        type: integer
                        example: 0
                      grid_col:
                        type: integer
                        example: 2
                      grid_row:
                        type: integer
                        example: 1
      responses:
        "200":
          description: Layout saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  configs:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserWidgetConfig"
        "400":
          description: Missing layout field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Widget does not belong to this family
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}/todos:
    get:
      summary: Get all todos for a family
      description: Requires can_view permission for the todo widget.
      tags: [Todos]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of todos
          content:
            application/json:
              schema:
                type: object
                properties:
                  todos:
                    type: array
                    items:
                      $ref: "#/components/schemas/Todo"
        "403":
          description: No permission or not a family member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Widget not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Create a new todo
      description: Requires can_edit permission for the todo widget.
      tags: [Todos]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  example: Einkaufen
                description:
                  type: string
                  nullable: true
                  example: Milch und Brot
      responses:
        "201":
          description: Todo created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Todo"
        "400":
          description: Missing title
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: No permission or not a family member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Widget not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}/todos/{todo_id}:
