  /api/families/{family_id}/timetable/entries:
    post:
      summary: Create a new timetable entry
      description: Requires can_edit permission. The color applies to all entries of a person — set it when creating the first entry for a new person.
      tags: [Timetable]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [person_name, color, weekday, start_time, end_time, subject]
              properties:
                person_name:
                  type: string
                  example: Emma
                color:
                  type: string
                  example: "#EF4444"
                  description: Hex color value, e.g. #EF4444. Should be the same for all entries of a person.
                weekday:
                  type: integer
                  example: 0
                  description: 0=Monday to 4=Friday
                start_time:
                  type: string
                  example: "08:00"
                  description: Format HH:MM
                end_time:
                  type: string
                  example: "08:45"
                  description: Format HH:MM, must be after start_time
                subject:
                  type: string
                  example: Mathematik
                room:
                  type: string
                  nullable: true
                  example: "101"
                teacher:
                  type: string
                  nullable: true
                  example: Mr. Smith
                note:
                  type: string
                  nullable: true
                  example: Don't forget homework
      responses:
        "201":
          description: Entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimetableEntry"
        "400":
          description: Validation error (missing field, invalid weekday, invalid time, invalid color)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: No permission or not a family member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

